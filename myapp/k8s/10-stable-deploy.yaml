# ---- Stable Deployment (production traffic) ----
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: myapp
  labels:
    app: myapp
    track: stable
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
      track: stable
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: myapp
        track: stable
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        prometheus.io/path: "/healthz"
    spec:
      nodeSelector:
        kubernetes.io/hostname: worker1
      containers:
        - name: myapp
          # Jenkins pipeline 会替换这个 tag: <commit-sha>
          image: registry.local:30080/myapp/myapp:latest
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
---
# ---- Stable Service ----
apiVersion: v1
kind: Service
metadata:
  name: myapp
  namespace: myapp
  labels:
    app: myapp
    track: stable
spec:
  selector:
    app: myapp
    track: stable
  ports:
    - name: http
      port: 80
      targetPort: 80
