<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>myapp</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; margin: 0;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #e2e8f0;
  }
  .card {
    background: rgba(30,41,59,0.8);
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 40px 60px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  }
  h1 { margin: 0 0 8px; font-size: 2em; }
  .version {
    display: inline-block;
    padding: 4px 16px;
    border-radius: 20px;
    font-size: 0.85em;
    font-weight: 600;
    margin-bottom: 16px;
  }
  .stable { background: #16a34a; color: #fff; }
  .canary { background: #eab308; color: #000; }
  .meta { color: #94a3b8; font-size: 0.9em; line-height: 1.8; }
</style>
</head>
<body>
<div class="card">
  <h1>myapp</h1>
  <span class="version CANARY_CLASS">CANARY_LABEL vAPP_VERSION</span>
  <div class="meta">
    <div>build: BUILD_ID</div>
    <div>pod: POD_NAME</div>
    <div>time: <span id="now"></span></div>
  </div>
</div>
<script>
  document.getElementById('now').textContent = new Date().toISOString();
</script>
</body>
</html>
